# How to map CSMs to regions
# Process for deriving a CSM -> region mapping from HubSpot data via TD.
# Excludes deactivated/active checks.

inputs:
  primary:
    name: TD hubspot.companies table (account 7060)
    type: td_sql
    rationale: |
      The hubspot.companies table in TD is a full sync of HubSpot company records
      and contains csm_email and td_company_owner_region on every row. Querying
      it via `tdx query` returns all records in a single call with no row-count
      limit — no sharding required. arr_won_all_rollup is the correct ARR column
      (arr_won__all_ is always zero in this table).
    access_via: tdx query (Bash tool)
    table: hubspot.companies
    columns_used:
      - name                      # account display name
      - csm_email                 # CSM email - primary identity key
      - td_company_owner_region   # region tag (Americas / EMEA / Japan / ASIAexJapan / APAC)
      - arr_won_all_rollup        # ARR rollup (use this — NOT arr_won__all_ which is always 0)
    query: |
      WITH csm_accounts AS (
        SELECT
          LOWER(SPLIT_PART(csm_email, '@', 1))          AS csm_local,
          csm_email,
          td_company_owner_region                        AS region,
          name                                           AS company,
          GREATEST(COALESCE(arr_won_all_rollup, 0), 0)  AS arr
        FROM hubspot.companies
        WHERE csm_email IS NOT NULL AND csm_email != ''
          AND td_company_owner_region IN ('Americas','EMEA','Japan','ASIAexJapan','APAC')
          AND (
            csm_email LIKE '%.%@treasure-data.com'
            OR csm_email LIKE '%.%@treasure.ai'
            OR csm_email IN ('valencia@treasure-data.com','ino@treasure-data.com',
                             'tsukahara@treasure-data.com','sekikawa@treasure-data.com')
          )
      ),
      region_counts AS (
        SELECT csm_local, region, COUNT(*) AS cnt
        FROM csm_accounts
        GROUP BY csm_local, region
      ),
      csm_majority AS (
        SELECT csm_local, region AS majority_region,
          ROW_NUMBER() OVER (
            PARTITION BY csm_local
            ORDER BY cnt DESC,
              CASE region
                WHEN 'Americas'    THEN 1
                WHEN 'EMEA'        THEN 2
                WHEN 'Japan'       THEN 3
                WHEN 'ASIAexJapan' THEN 4
                WHEN 'APAC'        THEN 5
              END
          ) AS rn
        FROM region_counts
      )
      SELECT
        a.csm_local,
        a.csm_email,
        m.majority_region  AS csm_region,
        a.region           AS account_region,
        a.company,
        ROUND(a.arr)       AS arr
      FROM csm_accounts a
      JOIN csm_majority m ON m.csm_local = a.csm_local AND m.rn = 1
      ORDER BY m.majority_region, a.csm_local, a.arr DESC
    usage: |
      Run with: tdx query "<sql above>" --limit 500 --json
      To scope to one region, add AND m.majority_region = 'Americas' before ORDER BY,
      or filter the result set after the fact in the calling skill.
      No sharding needed — the full table returns in one call.

  excluded:
    - name: HubSpot MCP tool (hubspot_search_crm_objects)
      reason: |
        Caps each response at 100 records with no cursor exposed. Required manual
        sharding across 8 parallel calls keyed on hs_object_id ranges. Replaced
        by the TD hubspot.companies table which returns all records in a single
        query with no size limit.
    - name: Greenspace HeatMap
      reason: |
        Previously the primary source. Now redundant because every Greenspace
        column derives from HubSpot custom company properties + deal associations
        + owner team metadata. HubSpot is the system of record; Greenspace is a
        sheet view that lags. Reintroduce only if RevOps maintains overrides in
        Greenspace that aren't pushed back to HubSpot.
    - name: Gainsight
      reason: Neither gsuser nor Company has a region field.
    - name: Glean people search
      reason: Returns documents associated with a person, not a directory record. No structured region attribute.
    - name: HubSpot owner endpoint
      reason: hubspot_search_owners blocked by current MCP auth scope. Used for proper-name resolution if/when unblocked.

steps:
  - id: 1_pull_td
    description: Run the query above via `tdx query` against hubspot.companies in TD account 7060.
    output: list of {csm_local, csm_email, csm_region, account_region, company, arr} rows
    notes: |
      The WHERE clause already filters out bogus csm_email values (name strings like
      "Hiroki Ito", external partner addresses like "jamie@origin63.com") by requiring
      a "." in the local part or membership in the single-token allowlist, AND a
      treasure.ai / treasure-data.com domain.
      region is pre-filtered to valid_regions so no further cleanup is needed.

  - id: 2_normalize_identity
    description: csm_local (lowercased local part of csm_email) is the identity key — already computed in the query.
    method: |
      key = email.split("@")[0].lower()
    notes: |
      The same CSM frequently appears under both @treasure-data.com and @treasure.ai.
      The SQL already normalizes this via LOWER(SPLIT_PART(csm_email, '@', 1)).
      No further dedup needed after the query runs.

  - id: 3_aggregate_per_csm
    description: |
      Majority region is computed in the query via ROW_NUMBER() with tie-break.
      After the query, group results by csm_local to build the CSM matrix.
    method: |
      # The query returns one row per account already joined to csm_region.
      # To build the matrix, group in Python/JS:
      for csm_local, rows in groupby(results, key='csm_local'):
        majority_region = rows[0]['csm_region']   # same for all rows (from JOIN)
        n_accounts      = len(rows)
        arr_total       = sum(max(r['arr'], 0) for r in rows)
        region_breakdown = Counter(r['account_region'] for r in rows)

        minority = sum(c for r, c in region_breakdown.items() if r != majority_region)
        cross_region = (
          len(region_breakdown) > 1
          and minority >= 2
          and minority / n_accounts >= 0.20
        )
    tie_break: |
      Deterministic tie-break order when two or more regions have the same count:
        Americas > EMEA > Japan > ASIAexJapan > APAC
      This is encoded directly in the SQL CASE expression — no post-processing needed.
      Record the tie in the matrix row as `tied_majority: [Americas, EMEA]` so a
      downstream reviewer can spot edge cases without re-deriving them.
    assignment_policy: |
      HARD RULE - csm_region is the ONLY input to roundup membership.
      An account whose account_region == "Americas" but whose owning CSM resolves
      to csm_region == "EMEA" appears in the EMEA roundup, not the Americas roundup.
      There is no per-account region override, no "Americas-tagged accounts split off"
      rule, no joint inclusion. The account is reported under its CSM's region; the
      per-account tag is shown in the rendered scorecard cell as informational metadata only.

      Anti-pattern (do NOT do this):
        scorecard = [a for a in per_account_table if a.account_region == target]
      Correct pattern:
        in_scope_csms = {csm for csm, info in csm_matrix.items() if info.csm_region == target}
        scorecard = [a for a in per_account_table if a.csm_local in in_scope_csms]
    notes: |
      The cross_region flag (>=20% minority AND >=2 minority accounts) catches
      genuine cross-region books like Ana María Villota Serrano (Americas + Nestlé
      EMEA-tagged entities), Carol Nicholson-Cole (UK + US Mars/Levi), Gaëlle Chedid
      (mostly EMEA + 1 Kuwait Food Americana account tagged Americas), and Naohiro
      Yoshikawa (Japan + Korean accounts in ASIAexJapan). The flag is for surfacing
      the breakdown in the rendered report, not for assigning accounts to a different
      region. Don't reassign their region - flag and surface.

  - id: 4_assign_confidence
    description: Confidence is a function of book size, since there's no second source to cross-check against.
    rules:
      - if n_accounts >= 5: high
      - if n_accounts >= 2: medium
      - if n_accounts == 1: low (single-account assignments are often placeholders, SDRs, or brand-new CSMs)

  - id: 5_resolve_display_name
    description: |
      The TD table has csm_email but no canonical display name.
      Apply the override map below first, then fall back to period-delimiter capitalization.
    overrides:
      ana.villotaserrano: "Ana María Villota Serrano"
      valencia: "Sean Valencia"
      meg.roy: "Megan Roy"
      ino: "Tsuyuki Ino"
      tsukahara: "Kazuki Tsukahara"
      sekikawa: "Makoto Sekikawa"
      naohiro.nakatani: "Nao Nakatani"
    fallback: |
      Split local part on '.' and '-', capitalize each token, join with spaces.
      Example: meg.roy -> "Meg Roy"; carol.nicholson-cole -> "Carol Nicholson Cole"
      (loses the hyphen - that's the limit of the fallback rule). When
      hubspot_search_owners is unblocked, prefer that over the fallback.

  - id: 6_emit_matrix
    description: |
      Output one row per CSM PLUS a per-account roll-up. The per-account table
      carries each account's own account_region tag (informational), but consumers MUST
      filter by csm_local against the in-scope CSM set, never by the per-account region tag.
    fields:
      - name              # display name (override or fallback)
      - email             # canonical csm_email from the table
      - region            # majority region (csm_region from query)
      - confidence        # high/medium/low based on n_accounts
      - n_accounts        # book size
      - arr_total         # sum of arr across their accounts (floored to 0)
      - region_breakdown  # Counter, e.g. {Americas: 12, EMEA: 4}
      - cross_region      # bool, true if >=20% minority + >=2 accounts
    accounts_table: |
      Per-account rows: {company, csm_local, csm_region, account_region, arr}.
      The cs-engagement-report skill consumes this directly as the book-of-business
      filter - no separate query needed for "what accounts does CSM X own?".

      Consumption rule (HARD):
        in_scope_csms = {csm for csm, info in csm_matrix.items()
                         if info.csm_region == target_region}
        scorecard_rows = [r for r in per_account_table
                          if r.csm_local in in_scope_csms]
      The per-account account_region field is NEVER used as a roundup filter. It is
      surfaced in the rendered scorecard for transparency only.

      Do NOT pre-filter by ARR here - emit every account (including zero-ARR rows).
      The cs-engagement-report skill applies its own configurable min_arr threshold
      at Step 1.6 and surfaces filtered accounts in the dashboard's excludedAccounts
      footer.

valid_regions:
  - Americas
  - EMEA
  - Japan
  - ASIAexJapan
  - APAC

known_pitfalls:
  - The same CSM appears under both @treasure-data.com and @treasure.ai email
    domains. The SQL normalizes this via SPLIT_PART on '@'. No further dedup needed.
  - Cross-region books (Nestlé spread across Americas/EMEA, Mars across UK/US,
    Korean accounts under a Japan-tagged CSM, Gaëlle Chedid's lone Kuwait Food
    Americana account inside an otherwise EMEA book) are real and structural.
    Don't "fix" them by reassigning the CSM's primary region - flag with
    cross_region: true and let the rendered report show the breakdown.
    AND: never split a cross-region CSM across two roundups. The CSM lives in
    exactly one regional roundup (their majority csm_region) and their full
    book travels with them.
  - csm_email occasionally contains a person's name string ("Hiroki Ito") or an
    external partner address ("jamie@origin63.com"). The WHERE clause filters
    these out by requiring a "." in the local part or membership in the
    single-token allowlist, AND a treasure.ai / treasure-data.com domain.
  - arr_won_all_rollup occasionally contains negative or zero values (cancelled
    deals, unreconciled credits). The SQL floors to 0 via GREATEST(..., 0).
  - arr_won__all_ (with double underscore) is always zero in this table — it is
    a different column from arr_won_all_rollup. Always use arr_won_all_rollup.
